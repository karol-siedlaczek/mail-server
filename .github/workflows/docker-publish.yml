name: Build and Push Docker Image

# Standalone mail-server repo: the whole repo IS the image build context, so a
# plain semver tag (v<semver>) triggers the build — no <image>/ tag prefix like
# the docker-images-homelab monorepo used.
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: registry.siedlaczek.com.pl
  IMAGE_NAME: mail-server

jobs:
  build-push:
    name: Build and push ${{ github.ref_name }}
    runs-on: [self-hosted, Linux]

    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"   # strip leading v: v0.1.0 -> 0.1.0
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ env.REGISTRY }}"]
              http = false
              insecure = true

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,scope=${{ env.IMAGE_NAME }},mode=max

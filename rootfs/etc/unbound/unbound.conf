# Self-contained, localhost-only recursive resolver for this appliance.
#
# Why this exists: Spamhaus (and other DNSBLs) refuse queries that arrive via
# large public/shared resolvers — Docker's embedded DNS forwards to the host's
# resolver, which is typically 8.8.8.8 / 1.1.1.1, so every DNSBL lookup came
# back as the error code 127.255.255.254 instead of a real verdict. unbound here
# RECURSES public names directly from the authoritative servers (so DNSBL sees a
# unique, non-public source) while FORWARDING the appliance's backend hostnames
# (postgres/redis/clamav/…) to Docker's embedded DNS so service discovery keeps
# working. render-config writes that forward list and points /etc/resolv.conf at
# 127.0.0.1 at boot.
server:
    verbosity: 0
    interface: 127.0.0.1
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only this container talks to it.
    access-control: 127.0.0.0/8 allow

    # The container is the isolation boundary — no chroot, no privilege drop
    # (s6 already supervises us). Avoids an empty-jail failure like Postfix had.
    username: ""
    chroot: ""
    directory: "/etc/unbound"
    pidfile: ""
    use-syslog: no
    logfile: ""

    # DNSSEC validation is intentionally OFF: this resolver only feeds Postfix
    # postscreen DNSBL + MX lookups and Rspamd, where a validation failure from
    # container clock skew would become SERVFAIL and stall mail. The DNSBL data
    # itself is not security-critical enough to risk that.
    module-config: "iterator"

    # Backend service names resolve to Docker's private IPs (172.x/10.x); do not
    # strip them as rebind answers. (private-address is left unset = no stripping.)
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    prefetch: yes
    cache-min-ttl: 60
    cache-max-ttl: 86400

# Backend hostnames → Docker embedded DNS. Rendered at boot by render-config;
# ships empty so unbound starts cleanly before the first render.
include: "/etc/unbound/unbound.conf.d/10-docker-forward.conf"
